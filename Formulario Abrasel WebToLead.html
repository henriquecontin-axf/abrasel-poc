      <!-- 
         AQUI ESTÁ O NOVO CÓDIGO DE INCORPORAÇÃO DO SEU FORMULÁRIO DO RD STATION.

      <!-- SCRIPT PARA OUVIR MENSAGENS DO VELO E PREENCHER OS CAMPOS -->
      <script>
         window.addEventListener("message", (event) => {
            // --- ⚠️ SEGURANÇA CRÍTICA EM PRODUÇÃO ---
            // Em um ambiente de produção, SEMPRE verifique a origem (event.origin) da mensagem!
            // Exemplo: if (event.origin !== "https://seusite.com") return;
            // Isso previne que scripts maliciosos em outras origens interceptem ou manipulem suas mensagens.
            // O '*' é usado aqui para simplificar a demonstração, mas NUNCA use em produção sem entender os riscos.

            console.log("Mensagem recebida no iframe (HTML):", event);

            // Verifica se a mensagem é do tipo 'utm_data' e se contém 'utmSource'
            if (
               event.data &&
               event.data.type === "utm_data" &&
               event.data.utmSource
            ) {
               const utmSourceValue = event.data.utmSource;

               // 1. Preenche o input hidden local no iframe
               const utmHiddenField = document.getElementById(
                  "utm-source-hidden-field",
               );
               if (utmHiddenField) {
                  utmHiddenField.value = utmSourceValue;
                  console.log(
                     "Input hidden 'utm-source-hidden-field' atualizado com utm_source:",
                     utmSourceValue,
                  );
               } else {
                  console.warn(
                     "Elemento hidden com ID 'utm-source-hidden-field' não encontrado no iframe.",
                  );
               }

               // 2. Lógica para aguardar e preencher o campo do RD Station
               let attempts = 0;
               const maxAttempts = 60; // Tenta por até 60 vezes (60 * 500ms = 30 segundos)
               const intervalTime = 500; // Tenta a cada 500ms (meio segundo)

               const checkRdField = setInterval(() => {
                  // O ID do campo que queremos preencher permanece 'rd-text_field-mg58x0lo'
                  const rdField = document.getElementById(
                     "rd-text_field-mgjnqa7r",
                  );

                  if (rdField) {
                     rdField.value = utmSourceValue;

                     // Dispara eventos 'change' e 'input' para que o RD Station detecte a alteração
                     rdField.dispatchEvent(
                        new Event("change", { bubbles: true }),
                     );
                     rdField.dispatchEvent(
                        new Event("input", { bubbles: true }),
                     );

                     console.log(
                        "✅ Campo do RD Station ('rd-text_field-mg58x0lo') preenchido com:",
                        utmSourceValue,
                     );
                     clearInterval(checkRdField); // Para de tentar assim que encontra e preenche
                  } else {
                     attempts++;
                     if (attempts >= maxAttempts) {
                        console.warn(
                           "⏳ Timeout: Campo do RD Station ('rd-text_field-mg58x0lo') não encontrado após " +
                              (maxAttempts * intervalTime) / 1000 +
                              " segundos.",
                        );
                        clearInterval(checkRdField); // Para de tentar após o tempo limite
                     } else {
                        console.log(
                           "⏳ Aguardando campo do RD Station ('rd-text_field-mg58x0lo') carregar... Tentativa " +
                              attempts +
                              " de " +
                              maxAttempts,
                        );
                     }
                  }
               }, intervalTime); // Tenta a cada 500ms

               // Opcional: Enviar uma mensagem de volta para o Velo confirmando o recebimento
               window.parent.postMessage(
                  {
                     status: "utm_hidden_field_atualizado",
                     value: utmSourceValue,
                  },
                  "*",
               );
            }
         });
      </script>
      <script>
         document.addEventListener("DOMContentLoaded", function () {
            // Aguarda o RD Form carregar
            const checkForm = setInterval(() => {
               // Substitua o seletor abaixo pelo ID do campo de CNPJ do seu formulário
               const cnpjField = document.querySelector(
                  'input[name="cf_cnpj"]',
               );

               if (cnpjField) {
                  clearInterval(checkForm);

                  // Função de máscara
                  cnpjField.addEventListener("input", function (e) {
                     let value = e.target.value.replace(/\D/g, ""); // remove tudo que não é número

                     if (value.length > 14) value = value.slice(0, 14);

                     // Aplica a máscara conforme o tamanho
                     if (value.length <= 2) {
                        e.target.value = value;
                     } else if (value.length <= 5) {
                        e.target.value = value.replace(
                           /^(\d{2})(\d{0,3})/,
                           "$1.$2",
                        );
                     } else if (value.length <= 8) {
                        e.target.value = value.replace(
                           /^(\d{2})(\d{3})(\d{0,3})/,
                           "$1.$2.$3",
                        );
                     } else if (value.length <= 12) {
                        e.target.value = value.replace(
                           /^(\d{2})(\d{3})(\d{3})(\d{0,4})/,
                           "$1.$2.$3/$4",
                        );
                     } else {
                        e.target.value = value.replace(
                           /^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})/,
                           "$1.$2.$3/$4-$5",
                        );
                     }
                  });
               }
            }, 500);
         });
      </script>
      <script>
         (function () {
            // Função que aplica a máscara de telefone (só se houver dígitos)
            function maskPhone(value) {
               const digits = (value || "").replace(/\D/g, "").slice(0, 11);
               if (digits.length === 0) return ""; // campo vazio antes de digitar
               if (digits.length <= 2) return "(" + digits;
               if (digits.length <= 6)
                  return digits.replace(/^(\d{2})(\d{0,4})$/, "($1) $2");
               if (digits.length <= 10)
                  return digits.replace(
                     /^(\d{2})(\d{4})(\d{0,4})$/,
                     "($1) $2-$3",
                  );
               return digits.replace(/^(\d{2})(\d{5})(\d{0,4})$/, "($1) $2-$3");
            }

            // Permite apenas números durante digitação
            function onlyNumbers(evt) {
               const k =
                  evt.key || String.fromCharCode(evt.which || evt.keyCode);
               if (
                  evt.ctrlKey ||
                  evt.metaKey ||
                  [
                     "Backspace",
                     "Delete",
                     "Tab",
                     "ArrowLeft",
                     "ArrowRight",
                     "Home",
                     "End",
                     "Enter",
                  ].includes(k)
               )
                  return;
               if (!/^\d$/.test(k)) evt.preventDefault();
            }

            function wirePhone() {
               const original = document.querySelector(
                  'input[name="mobile_phone"]',
               );
               if (!original || original.dataset.proxyBound) return;
               original.dataset.proxyBound = "1";

               // Cria o campo proxy (visível)
               const proxy = document.createElement("input");
               proxy.type = "tel";
               proxy.name = "mobile_phone_proxy";
               proxy.placeholder = original.placeholder || "Telefone *";
               proxy.autocomplete = "tel-national";
               proxy.inputMode = "numeric";
               proxy.maxLength = 15;
               proxy.required = original.required;

               // Copia classes e atributos visuais do campo original (mantém o layout RD)
               proxy.className = original.className;
               proxy.setAttribute(
                  "data-use-type",
                  original.getAttribute("data-use-type") || "STRING",
               );
               proxy.setAttribute("data-always-visible", "true");

               // Oculta o campo original (mantendo name para envio ao RD)
               Object.assign(original.style, {
                  position: "absolute",
                  left: "-99999px",
                  width: "1px",
                  height: "1px",
                  opacity: "0",
                  pointerEvents: "none",
               });

               // Insere o proxy logo depois do original
               original.insertAdjacentElement("afterend", proxy);

               // Inicializa campo vazio
               proxy.value = "";
               original.value = "";

               // Sincroniza os campos durante digitação
               proxy.addEventListener("keypress", onlyNumbers);
               proxy.addEventListener("input", () => {
                  proxy.value = maskPhone(proxy.value);
                  original.value = proxy.value.replace(/\D/g, "").slice(0, 11);
               });

               proxy.addEventListener("paste", (e) => {
                  e.preventDefault();
                  const text =
                     (e.clipboardData || window.clipboardData).getData(
                        "text",
                     ) || "";
                  const digits = text.replace(/\D/g, "").slice(0, 11);
                  proxy.value = maskPhone(digits);
                  original.value = digits;
               });

               // Garante que o RD receba apenas números no envio
               const form = original.closest("form");
               if (form) {
                  form.addEventListener(
                     "submit",
                     () => {
                        original.value = proxy.value
                           .replace(/\D/g, "")
                           .slice(0, 11);
                     },
                     true,
                  );
               }
            }

            // Observa o DOM e aplica a máscara dinamicamente
            const interval = setInterval(wirePhone, 300);
            document.addEventListener("readystatechange", wirePhone);
            setTimeout(() => clearInterval(interval), 20000);
         })();
      </script>
